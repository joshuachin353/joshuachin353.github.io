<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Space+Grotesk:wght@300..700&display=swap');

        .mostcommon {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 30;
            color: rgb(0, 0, 0);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .topleftimage {
            width: 219.54px;
            height: 56px;
            gap: 10px;
            padding-top: 10px;
            Padding-bottom: 10px;

        }

        .buttontop {
            border-radius: 14px;
            border: 1px solid rgb(0, 0, 0);
            color: rgb(0, 0, 0);
            width: 231px;
            height: 68px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
        }

        .header1 {
            display: flex;
            width: 1440px;
            height: 450px;
            justify-content: space-between;
            align-items: flex-start;
            padding: 60px;
            gap: auto;
        }

        .middletextleft {
            width: 600px;
            height: auto;
            gap: 35px;
            align-items: top;
            font-size: 60px;
        }

        .bigimage {
            width: 600.46px;
            height: 515px;
            padding-right: 10px;
        }

        .belowheader1 {
            font-size: 20px
        }

        .belowheader1paragraph {
            width: 600px;
            height: auto;
            gap: 35px;
            align-items: top;
        }

        .belowheader1button {
            border-radius: 14px;
            width: 264px;
            height: 68px;
            background-color: black;
            color: white;
            font-size: 20px;
            font-weight: 400;
            margin: 2px;
            text-align: center;
        }

        .images {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            gap: 20px;
            filter: brightness(0);
            height: 48px;
        }
    </style>
</head>

<body>
    <div class="mostcommon">
        <div class="topbar">
            <div class="topleftimage">
                <img src="week3 images/Logo.png" alt="Logo">
            </div>
            <div>
                <p>About us</p>
            </div>
            <div>
                <p>Services</p>
            </div>
            <div>
                <p>Use Cases</p>
            </div>
            <div>
                <p>Pricing</p>
            </div>
            <div>
                <p>Blog</p>
            </div>
            <div class="buttontop">
                <p>Request a quote</p>
            </div>
        </div>
        <div class="header1">
            <div class="bigimage">
                <div><img src="week3 images/Illustration.png" alt="Illustration"></div>
            </div>
            <div class="middletextleft>">
                <div>
                    <h1>Navigating the<br>
                        digital landscape<br>
                        for success</h1>
                </div>
            </div>
        </div>
        <div class="belowheader1">
            <div class="belowheader1paragraph">
                <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including SEO, PPC, social media marketing, and content creation.</p>
            </div>
            <div class="belowheader1button">
                <div>
                    <p>Book a consultation</p>
                </div>
            </div>
        </div>
    </div>
    <div class="images">
        <div><img src="week3 images/Company logo.png" alt="Logo1"></div>
        <div><img src="week3 images/Company logo (1).png" alt="Logo2"></div>
        <div><img src="week3 images/Company logo (2).png" alt="Logo3"></div>
        <div><img src="week3 images/Company logo (3).png" alt="Logo4"></div>
        <div><img src="week3 images/Company logo (4).png" alt="Logo5"></div>
        <div><img src="week3 images/Company logo (5).png" alt="Logo6"></div>
    </div>
</body>

</html>
