<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button.html</title>
    <style>
        button {

            border: none;
            color: white;
            padding: 15px 32px;

            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
        }

            color: white;
            padding: 12px 30px;

            display: inline-block;
            font-size: 20px;
            margin: 4px 2px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
        }

        }
